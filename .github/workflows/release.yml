name: Release

# Triggers (any of these):
#   1. Tag push matching `v*` (canonical path — `git push origin v0.1.2`).
#      Version is taken from the tag itself.
#   2. Push to `master` / `main` that modifies `neutralino.config.json`.
#      Legacy auto-trigger; tagging is preferred — see AGENTS.md.
#   3. Manual `workflow_dispatch` — useful for re-publishing the
#      current version's artefacts.
#
# The build fans out across five native runners, one per supported
# (os, arch) combination. Native runners avoid the cross-compile pain
# of npm packages with native addons (better-sqlite3 in particular).
#
#   linux-x86_64    ubuntu-latest          .deb / .rpm / AppImage
#   linux-aarch64   ubuntu-24.04-arm       .deb / .rpm / AppImage
#   macos-x86_64    macos-13               .dmg
#   macos-aarch64   macos-14               .dmg
#   windows-x86_64  windows-latest         NSIS Setup .exe
#
# A final `release` job downloads every artefact and publishes them as
# a single GitHub Release tagged `v<version>`.

on:
  push:
    branches: [main, master]
    paths:
      - "neutralino.config.json"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. Resolve the version once. Every downstream job consumes the
  #    same `new` output so we don't re-grep on each runner.
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      new:  ${{ steps.version.outputs.new }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read versions
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            NEW="${GITHUB_REF#refs/tags/v}"
            echo "Tag push: version=$NEW"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            NEW=$(grep -oP '"version"\s*:\s*"\K[^"]+' neutralino.config.json | head -1)
            OLD=""
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              OLD=$(git show HEAD~1:neutralino.config.json | grep -oP '"version"\s*:\s*"\K[^"]+' | head -1 || echo "")
            fi
            echo "Branch push: old=$OLD new=$NEW"
            if [ "$NEW" = "$OLD" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Skip notice
        if: steps.version.outputs.skip == 'true'
        run: echo "Version unchanged (${{ steps.version.outputs.new }}), skipping release."

  # 2. Per-platform builds. Each runs on its native arch.
  build:
    needs: resolve-version
    if: needs.resolve-version.outputs.skip == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runs_on: ubuntu-latest
            ln_os: linux
            ln_arch: x86_64
          - target: linux-aarch64
            runs_on: ubuntu-24.04-arm
            ln_os: linux
            ln_arch: aarch64
          # Intel macOS (macos-13) was retired from free public-repo
          # queues in 2026; jobs sit in `Waiting for a runner...`
          # indefinitely. Apple Silicon-only for now. Re-add via
          # cross-compile from macos-14 if Intel demand surfaces.
          - target: macos-aarch64
            runs_on: macos-14
            ln_os: macos
            ln_arch: aarch64
          - target: windows-x86_64
            runs_on: windows-latest
            ln_os: windows
            ln_arch: x86_64

    runs-on: ${{ matrix.runs_on }}
    name: build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # ---------------- Linux deps (apply to both x86_64 and aarch64).
      - name: Install Linux deps
        if: matrix.ln_os == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            rpm \
            librsvg2-bin \
            fuse \
            libfuse2 \
            file

      # ---------------- macOS deps (librsvg for icon rendering).
      - name: Install macOS deps
        if: matrix.ln_os == 'macos'
        run: |
          brew update
          brew install librsvg || true

      # ---------------- Windows deps (Chocolatey is preinstalled on
      #     `windows-latest`, but NSIS itself isn't — install it).
      - name: Install NSIS (Windows)
        if: matrix.ln_os == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # makensis.exe lands at C:\Program Files (x86)\NSIS\
          if (-not (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe")) {
            Write-Error "NSIS install reported success but makensis.exe wasn't found"
            exit 1
          }

      - name: Cache Deno deps
        uses: actions/cache@v4
        with:
          # actions/cache treats the path list as patterns; missing
          # paths are silently ignored, so it's fine to list all three
          # OS conventions in every job. Forward slashes work in all.
          path: |
            ~/.cache/deno
            ~/Library/Caches/deno
            ~/AppData/Local/deno
            node_modules
          key: deps-${{ matrix.target }}-${{ hashFiles('package-lock.json', 'deno.lock') }}
          restore-keys: |
            deps-${{ matrix.target }}-

      - name: Install deps
        shell: bash
        run: |
          # Three-step install. All are required:
          #
          # 1. npm install — produces a flat node_modules/<pkg>/ tree.
          #    Vite (under Deno) and Deno's npm: resolver both walk
          #    this for npm packages. The flat layout sidesteps Deno's
          #    auto-mode symlink layout, which is unreliable on
          #    Windows (NTFS junctions break Node's CJS require()
          #    walk for transitives like source-map-js, semver, …).
          #    --legacy-peer-deps: better-auth's peerOptional on
          #    better-sqlite3@^12 conflicts with our pinned ^11. The
          #    peer is optional so the conflict is benign.
          npm install --no-audit --no-fund --legacy-peer-deps
          # 2. deno install — populates the global Deno cache with
          #    jsr: specifiers and resolves jsr: → https: in
          #    deno.lock. Without this, Vite's @deno/loader plugin
          #    fails with "jsr: specifiers must be resolved to an
          #    https: specifier before being loaded" when it hits
          #    things like jsr:@fresh/core/runtime-client.
          #    With nodeModulesDir: "manual" in deno.json this
          #    *doesn't* touch node_modules — npm's flat layout
          #    survives.
          deno install
          # 3. Fetch Neutralino native binaries into bin/. This dir
          #    is gitignored (binaries are large and per-arch);
          #    @neutralinojs/neu downloads the matching set on demand.
          #    Required for windowed-mode bundling on every platform.
          npx -y @neutralinojs/neu update

      # ---------------- Builds.
      - name: Build (Linux)
        if: matrix.ln_os == 'linux'
        shell: bash
        env:
          LN_TARGET_OS:   ${{ matrix.ln_os }}
          LN_TARGET_ARCH: ${{ matrix.ln_arch }}
        run: |
          bash scripts/build-deb.sh
          bash scripts/build-rpm.sh
          bash scripts/build-appimage.sh

      - name: Build (macOS)
        if: matrix.ln_os == 'macos'
        shell: bash
        env:
          LN_TARGET_OS:   ${{ matrix.ln_os }}
          LN_TARGET_ARCH: ${{ matrix.ln_arch }}
        run: |
          bash scripts/build-macos.sh

      - name: Build (Windows)
        if: matrix.ln_os == 'windows'
        shell: bash
        env:
          LN_TARGET_OS:   ${{ matrix.ln_os }}
          LN_TARGET_ARCH: ${{ matrix.ln_arch }}
        run: |
          bash scripts/build-windows.sh

      - name: List artefacts
        shell: bash
        run: ls -la dist/

      # ---------------- Upload artefacts to a per-target slot. The
      #     `release` job below downloads all of them at once.
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: librenotebook-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*.dmg
            dist/LibreNotebook-Setup-*.exe

  # 3. Aggregate every build's artefacts into a single GitHub Release.
  release:
    needs: [resolve-version, build]
    if: needs.resolve-version.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.new }}
          name: LibreNotebook v${{ needs.resolve-version.outputs.new }}
          body: |
            Automated release for v${{ needs.resolve-version.outputs.new }}.

            **Linux**
            - `librenotebook_${{ needs.resolve-version.outputs.new }}_amd64.deb`            — Debian / Ubuntu / Mint (x86_64)
            - `librenotebook_${{ needs.resolve-version.outputs.new }}_arm64.deb`            — Debian / Ubuntu / Mint (arm64)
            - `librenotebook-${{ needs.resolve-version.outputs.new }}-1.x86_64.rpm`         — Fedora / RHEL / openSUSE (x86_64)
            - `librenotebook-${{ needs.resolve-version.outputs.new }}-1.aarch64.rpm`        — Fedora / RHEL / openSUSE (arm64)
            - `LibreNotebook-${{ needs.resolve-version.outputs.new }}-x86_64.AppImage`      — any modern Linux distro (x86_64)
            - `LibreNotebook-${{ needs.resolve-version.outputs.new }}-aarch64.AppImage`     — any modern Linux distro (arm64)

            **macOS** (Apple Silicon only — unsigned, first launch:
            right-click → Open, or `xattr -d com.apple.quarantine LibreNotebook.app`)
            - `LibreNotebook-${{ needs.resolve-version.outputs.new }}-macos-arm64.dmg`      — Apple Silicon (M1/M2/M3/M4)

            **Windows**
            - `LibreNotebook-Setup-${{ needs.resolve-version.outputs.new }}-x86_64.exe`     — NSIS installer (per-user, no admin required)

            See the [README](https://github.com/JamesClarke7283/LibreNotebook#readme) for run modes and configuration.

            License: AGPL-v3-or-later.
          files: |
            artifacts/librenotebook_${{ needs.resolve-version.outputs.new }}_amd64.deb
            artifacts/librenotebook_${{ needs.resolve-version.outputs.new }}_arm64.deb
            artifacts/librenotebook-${{ needs.resolve-version.outputs.new }}-1.x86_64.rpm
            artifacts/librenotebook-${{ needs.resolve-version.outputs.new }}-1.aarch64.rpm
            artifacts/LibreNotebook-${{ needs.resolve-version.outputs.new }}-x86_64.AppImage
            artifacts/LibreNotebook-${{ needs.resolve-version.outputs.new }}-aarch64.AppImage
            artifacts/LibreNotebook-${{ needs.resolve-version.outputs.new }}-macos-arm64.dmg
            artifacts/LibreNotebook-Setup-${{ needs.resolve-version.outputs.new }}-x86_64.exe
          fail_on_unmatched_files: true
