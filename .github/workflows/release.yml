name: Release

# Triggers (any of these):
#   1. Tag push matching `v*` (canonical path — `git push origin v0.1.1`).
#      Version is taken from the tag itself.
#   2. Push to `master` / `main` that modifies `neutralino.config.json`.
#      The workflow diffs HEAD~1's version against the new one and
#      silently skips if unchanged. Legacy auto-trigger; tagging is
#      preferred — see AGENTS.md.
#   3. Manual `workflow_dispatch` — useful for re-publishing the
#      current version's artefacts.
#
# Steps:
#   1. Resolve the version (from the tag, or from neutralino.config.json)
#   2. Build the .deb, the .rpm, and the AppImage
#   3. Publish a GitHub Release tagged v<version> with all three artefacts.
#      `softprops/action-gh-release@v2` reuses an existing tag if one
#      already exists, so tag-triggered runs land on the same tag.

on:
  push:
    branches: [main, master]
    paths:
      - "neutralino.config.json"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need HEAD~1 to compare versions

      - name: Read versions
        id: version
        run: |
          # Tag pushes (refs/tags/v*) take their version from the tag.
          # Branch pushes diff HEAD~1's neutralino.config.json against
          # the current one and skip if unchanged.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            NEW="${GITHUB_REF#refs/tags/v}"
            OLD=""
            echo "Tag push: version=$NEW"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            NEW=$(grep -oP '"version"\s*:\s*"\K[^"]+' neutralino.config.json | head -1)
            OLD=""
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              OLD=$(git show HEAD~1:neutralino.config.json | grep -oP '"version"\s*:\s*"\K[^"]+' | head -1 || echo "")
            fi
            echo "Branch push: old=$OLD new=$NEW"
            if [ "$NEW" = "$OLD" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$OLD" >> "$GITHUB_OUTPUT"

      - name: Skip notice
        if: steps.version.outputs.skip == 'true'
        run: echo "Version unchanged ($(${{ steps.version.outputs.new }})), skipping release."

      - name: Setup Deno
        if: steps.version.outputs.skip == 'false'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install build dependencies
        if: steps.version.outputs.skip == 'false'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            rpm \
            librsvg2-bin \
            fuse \
            libfuse2 \
            file
          # appimagetool wants FUSE 2 to *run*; the produced AppImage
          # itself doesn't need it on user machines.
          # `rpm` provides rpmbuild for the .rpm package.

      - name: Cache Deno deps
        if: steps.version.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            node_modules
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-

      - name: Pre-cache npm + jsr deps
        if: steps.version.outputs.skip == 'false'
        run: deno task dev --help >/dev/null 2>&1 || true

      - name: Build .deb
        if: steps.version.outputs.skip == 'false'
        run: deno task build:deb

      - name: Build .rpm
        if: steps.version.outputs.skip == 'false'
        run: deno task build:rpm

      - name: Build AppImage
        if: steps.version.outputs.skip == 'false'
        run: deno task build:appimage

      - name: List artefacts
        if: steps.version.outputs.skip == 'false'
        run: ls -la dist/

      - name: Create release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: LibreNotebook v${{ steps.version.outputs.new }}
          body: |
            Automated release for v${{ steps.version.outputs.new }}.

            **Downloads**
            - `librenotebook_${{ steps.version.outputs.new }}_amd64.deb` — Debian / Ubuntu / derivatives
            - `librenotebook-${{ steps.version.outputs.new }}-1.x86_64.rpm` — Fedora / RHEL / openSUSE
            - `LibreNotebook-${{ steps.version.outputs.new }}-x86_64.AppImage` — any modern Linux distro

            See the [README](https://github.com/impulse/LibreNotebook#readme) for run modes and configuration.

            License: AGPL-v3-or-later.
          files: |
            dist/librenotebook_${{ steps.version.outputs.new }}_amd64.deb
            dist/librenotebook-${{ steps.version.outputs.new }}-1.x86_64.rpm
            dist/LibreNotebook-${{ steps.version.outputs.new }}-x86_64.AppImage
          fail_on_unmatched_files: true
