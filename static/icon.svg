<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32">
  <!-- LibreNotebook brand mark: a notebook with concentric arcs riffing on the
       notebook + radio-wave motif. White stroke on transparent so it works on
       both light and dark backgrounds. -->
  <g fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="6" y="4" width="20" height="24" rx="3"/>
    <line x1="10" y1="4" x2="10" y2="28"/>
    <path d="M14 16 q3 -3 6 0"/>
    <path d="M13 19 q4 -4 8 0"/>
    <circle cx="17" cy="22" r="1.2" fill="#ffffff"/>
  </g>
</svg>
